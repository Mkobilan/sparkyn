jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Generation
        run: |
          curl -X POST https://${{ secrets.VERCEL_PROJECT_URL }}/api/cron/process \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
